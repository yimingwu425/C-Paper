<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>C-Paper v5.1 — Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f5;--surface:#ffffff;--surface2:#f3f2ee;--surface3:#e8e6dc;
  --border:rgba(20,20,19,0.07);--border2:rgba(20,20,19,0.12);
  --text:#141413;--text2:#6b6960;--text3:#a09e96;
  --accent:#d97757;--accent2:#6a9bcc;--accent-dim:rgba(217,119,87,0.10);
  --ok:#788c5d;--err:#c53030;--warn:#b8860b;
  --sans:'Nunito Sans','Noto Sans SC',system-ui,sans-serif;
  --serif:'Playfair Display','Noto Serif SC',Georgia,serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"]{
  --bg:#0c0c0b;--surface:#161614;--surface2:#1e1e1c;--surface3:#262624;
  --border:rgba(250,249,245,0.06);--border2:rgba(250,249,245,0.10);
  --text:#f0efe8;--text2:#b0aea5;--text3:#706e66;
  --accent:#e8845a;--accent2:#6a9bcc;--accent-dim:rgba(232,132,90,0.12);
  --ok:#8fa870;--err:#e05555;--warn:#d4a03c;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased;}

.app{display:grid;height:100vh;
  grid-template-columns:56px 1fr;
  grid-template-rows:1fr 64px;
  gap:0;}

.rail{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;
  align-items:center;padding:12px 0;gap:2px;
  background:var(--surface);border-right:1px solid var(--border);
  position:relative;z-index:100;transition:width .25s var(--ease);}
.rail:hover{width:180px;align-items:flex-start;padding:12px 8px;}
.rail-logo{width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#c06838);
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
  box-shadow:0 2px 12px rgba(217,119,87,0.25);flex-shrink:0;}
.rail-logo svg{width:16px;height:16px;stroke:#fff;}
.rail-btn{width:40px;height:36px;border-radius:8px;border:none;
  background:transparent;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:0;
  transition:all .2s var(--ease);position:relative;overflow:hidden;
  white-space:nowrap;flex-shrink:0;}
.rail:hover .rail-btn{width:100%;justify-content:flex-start;padding:0 10px;gap:10px;}
.rail-btn:hover{background:var(--surface2);color:var(--text2);}
.rail-btn.on{color:var(--accent);background:var(--accent-dim);}
.rail-btn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:16px;border-radius:0 2px 2px 0;background:var(--accent);}
.rail-btn svg{width:18px;height:18px;stroke:currentColor;flex-shrink:0;}
.rail-label{font-size:11px;font-weight:500;opacity:0;width:0;overflow:hidden;
  transition:opacity .15s .05s,width .15s;}
.rail:hover .rail-label{opacity:1;width:auto;}
.rail-spacer{flex:1;}
.rail-divider{width:20px;height:1px;background:var(--border);margin:6px 0;}
.rail:hover .rail-divider{width:calc(100% - 16px);margin:6px 8px;}

.main{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;}

.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);}
.search-box{flex:1;max-width:480px;position:relative;}
.search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px 8px 36px;color:var(--text);font-size:13px;
  font-family:var(--sans);outline:none;transition:all .2s var(--ease);}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.search-box input::placeholder{color:var(--text3);}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;stroke:var(--text3);pointer-events:none;}
.topbar-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}
.topbar-tag{font-size:10px;color:var(--accent);background:var(--accent-dim);
  padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.3px;}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 8px var(--ok);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-status{font-size:11px;color:var(--text2);font-family:var(--serif);font-style:italic;}
.theme-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);}
.theme-btn:hover{background:var(--surface2);color:var(--text2);}
.theme-btn svg{width:14px;height:14px;}

.content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.06);border-radius:2px;}

.bento{display:grid;grid-template-columns:2fr 1fr;gap:12px;}
.bento-full{grid-column:1/-1;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:all .3s var(--ease);position:relative;}
.card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.06);}
[data-theme="dark"] .card:hover{box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.card-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;
  border-bottom:1px solid var(--border);}
.card-hdr svg{width:14px;height:14px;stroke:var(--text3);}
.card-title{font-family:var(--serif);font-size:14px;font-weight:600;flex:1;}
.card-badge{font-size:9px;color:var(--accent);background:var(--accent-dim);
  padding:2px 8px;border-radius:10px;font-weight:600;}
.card-body{padding:12px 16px;}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-chip{display:flex;align-items:center;gap:4px;padding:5px 12px;
  border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:11px;font-family:var(--sans);cursor:pointer;
  transition:all .2s var(--ease);}
.filter-chip:hover{border-color:var(--border2);background:var(--surface2);}
.filter-chip.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);font-weight:600;}
.filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:11px;padding:5px 10px;font-family:var(--sans);outline:none;
  appearance:none;cursor:pointer;}

.results-grid{display:flex;flex-direction:column;gap:0;}
.res-group-hdr{padding:8px 0;font-family:var(--serif);font-size:12px;color:var(--accent);
  font-weight:600;display:flex;align-items:center;gap:6px;}
.res-group-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.res-row{display:grid;grid-template-columns:40px 1fr 1fr 32px;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border);align-items:center;
  transition:all .15s;animation:slideIn .3s var(--ease) both;}
.res-row:last-child{border-bottom:none;}
.res-row:hover{background:var(--surface2);border-radius:6px;padding-left:4px;padding-right:4px;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}}
.res-row:nth-child(2){animation-delay:.03s}.res-row:nth-child(3){animation-delay:.06s}
.res-row:nth-child(4){animation-delay:.09s}.res-row:nth-child(5){animation-delay:.12s}
.res-row:nth-child(6){animation-delay:.15s}
.res-check{display:flex;gap:3px;align-items:center;}
.res-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s var(--ease);}
.res-cb.on{background:var(--accent);border-color:var(--accent);}
.res-cb.on svg{stroke:#fff;}
.res-cb svg{width:10px;height:10px;stroke:transparent;stroke-width:3;}
.res-cb.dim{opacity:.2;cursor:not-allowed;}
.res-fname{font-family:var(--serif);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-fname.exist{color:var(--text);}
.res-fname.miss{color:var(--text3);opacity:.4;}
.res-status{display:flex;align-items:center;justify-content:center;}
.res-status svg{width:12px;height:12px;}

.setting-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
.setting-row label{font-size:11px;color:var(--text2);width:40px;}
.setting-row input[type=range]{flex:1;height:3px;background:var(--surface3);
  border-radius:2px;accent-color:var(--accent);cursor:pointer;}
.setting-row .sval{font-size:10px;color:var(--text3);width:30px;text-align:right;font-variant-numeric:tabular-nums;}
.setting-row select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:10px;padding:3px 8px;font-family:var(--sans);outline:none;}
.dir-row{display:flex;align-items:center;gap:6px;padding:6px 0;}
.dir-disp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;font-family:var(--serif);font-size:10px;color:var(--text2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dir-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.dir-btn:hover{border-color:var(--border2);color:var(--text2);}
.dir-btn svg{width:12px;height:12px;stroke:currentColor;}
.chk-label{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:pointer;}
.chk-label input{accent-color:var(--accent);width:12px;height:12px;}

.fav-float{position:fixed;top:60px;right:20px;width:220px;z-index:200;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.08);overflow:hidden;
  transform:translateY(-8px);opacity:0;pointer-events:none;
  transition:all .25s var(--ease-spring);}
[data-theme="dark"] .fav-float{box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.fav-float.on{transform:translateY(0);opacity:1;pointer-events:auto;}
.fav-float .card-hdr{padding:10px 14px 6px;}
.fav-float .card-body{padding:8px 14px 10px;}
.fav-row{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--border);cursor:pointer;transition:all .12s;}
.fav-row:last-child{border-bottom:none;}
.fav-row:hover{padding-left:3px;}
.fav-code{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--accent);width:45px;}
.fav-name{flex:1;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fav-rm{width:18px;height:18px;border:none;background:transparent;color:var(--text3);
  cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;
  transition:all .12s;opacity:0;}
.fav-row:hover .fav-rm{opacity:1;}
.fav-rm:hover{color:var(--err);background:rgba(197,48,48,0.08);}
.fav-rm svg{width:10px;height:10px;stroke:currentColor;}
.fav-empty{text-align:center;color:var(--text3);font-size:11px;padding:12px;font-family:var(--serif);font-style:italic;}

.dock{grid-column:2;grid-row:2;display:flex;align-items:center;gap:12px;
  padding:0 20px;background:var(--surface);border-top:1px solid var(--border);}
.dock-progress{flex:1;display:flex;align-items:center;gap:10px;}
.progress-bar{flex:1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;width:60%;transition:width .5s var(--ease);
  position:relative;overflow:hidden;}
.progress-fill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation:shimmer 1.5s infinite;}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.progress-text{font-size:10px;color:var(--text3);min-width:60px;font-variant-numeric:tabular-nums;}
.dock-stats{display:flex;gap:12px;}
.dock-stat{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;}
.dock-stat svg{width:10px;height:10px;}
.dock-stat.s-dl{color:var(--accent);}
.dock-stat.s-ok{color:var(--ok);}
.dock-stat.s-err{color:var(--err);}
.dock-btn{padding:8px 20px;border-radius:10px;border:none;font-size:12px;
  font-weight:700;font-family:var(--sans);cursor:pointer;
  transition:all .2s var(--ease);display:flex;align-items:center;gap:6px;}
.dock-btn:active{transform:scale(0.96);}
.dock-btn.primary{background:linear-gradient(135deg,var(--accent),#c06838);color:#fff;
  box-shadow:0 2px 16px rgba(217,119,87,0.25);}
.dock-btn.primary:hover{box-shadow:0 4px 24px rgba(217,119,87,0.35);}
.dock-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.dock-btn.secondary:hover{border-color:var(--border2);}
.dock-btn svg{width:14px;height:14px;stroke:currentColor;}

#toasts{position:fixed;top:16px;right:16px;z-index:999;
  display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:10px 14px;font-size:11px;min-width:200px;display:flex;gap:8px;align-items:center;
  animation:toastIn .3s var(--ease-spring);pointer-events:auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);}
[data-theme="dark"] .toast{box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.ok{border-left:2px solid var(--ok);}
.toast.err{border-left:2px solid var(--err);}
.toast.warn{border-left:2px solid var(--warn);}
.toast.info{border-left:2px solid var(--accent);}
@keyframes toastIn{from{transform:translateX(120%) scale(0.9);opacity:0}}

.glow{position:fixed;pointer-events:none;z-index:0;}
.glow-1{top:-20%;left:-10%;width:50%;height:50%;
  background:radial-gradient(ellipse,rgba(217,119,87,0.04),transparent 60%);}
.glow-2{bottom:-20%;right:-10%;width:40%;height:40%;
  background:radial-gradient(ellipse,rgba(106,155,204,0.03),transparent 60%);}
[data-theme="dark"] .glow-1{background:radial-gradient(ellipse,rgba(232,132,90,0.06),transparent 60%);}
[data-theme="dark"] .glow-2{background:radial-gradient(ellipse,rgba(106,155,204,0.04),transparent 60%);}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div id="toasts"></div>

<div class="fav-float" id="fav-panel">
  <div class="card-hdr">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="card-title">收藏</span>
    <span class="card-badge">3</span>
  </div>
  <div class="card-body">
    <div class="fav-row">
      <span class="fav-code">9702</span>
      <span class="fav-name">Physics</span>
      <button class="fav-rm"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="fav-row">
      <span class="fav-code">9701</span>
      <span class="fav-name">Chemistry</span>
      <button class="fav-rm"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="fav-row">
      <span class="fav-code">9700</span>
      <span class="fav-name">Biology</span>
      <button class="fav-rm"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>
</div>

<div class="app">
  <nav class="rail">
    <div class="rail-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <button class="rail-btn on" title="搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="rail-label">搜索</span>
    </button>
    <button class="rail-btn" title="批量下载">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <span class="rail-label">批量下载</span>
    </button>
    <button class="rail-btn" title="下载列表">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="rail-label">下载列表</span>
    </button>
    <div class="rail-divider"></div>
    <button class="rail-btn" title="收藏" onclick="document.getElementById('fav-panel').classList.toggle('on')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span class="rail-label">收藏</span>
    </button>
    <div class="rail-spacer"></div>
    <div class="rail-divider"></div>
    <button class="rail-btn" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="rail-label">设置</span>
    </button>
  </nav>

  <div class="main">
    <div class="topbar">

<script>
function toggleTheme(){
  const h=document.documentElement;
  h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';
}
const input=document.getElementById('cmd-input');
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const v=input.value.trim();
    if(v)document.querySelector('.topbar-tag').textContent=v;
  }
});
document.addEventListener('click',e=>{
  const fp=document.getElementById('fav-panel');
  if(!fp.classList.contains('on'))return;
  if(fp.contains(e.target))return;
  if(e.target.closest('.rail-btn[title="收藏"]'))return;
  fp.classList.remove('on');
});
</script>
