<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=620">

<link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="app">

<header class="topbar">
  <div class="topbar-logo"></div>
  <span class="topbar-brand">C&#8209;Paper</span>
  <nav class="tabs">
    <button class="tab-btn on" data-tab="search">搜索</button>
    <button class="tab-btn" data-tab="batch">批量</button>
  </nav>
  <div class="topbar-right">
    <span class="topbar-dot idle" id="hdr-dot"></span>
    <button class="fav-btn" id="fav-btn" title="收藏科目">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
    <button class="theme-btn" id="theme-btn" title="切换主题"></button>
    <button class="settings-btn" id="settings-btn" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<div class="content">

<div class="fav-bar" id="fav-bar" style="display:none">
  <span class="fav-bar-title">收藏科目</span>
  <div class="fav-chips" id="fav-chips"></div>
</div>

<div class="panel on" id="pnl-search">
  <div class="filter-row">
    <select id="s-subj"><option value="">加载中...</option></select>
    <select id="s-year"></select>
    <select id="s-seas">
      <option value="">所有季节</option>
      <option value="m">春季 (Mar)</option>
      <option value="s">夏季 (Jun)</option>
      <option value="w">冬季 (Nov)</option>
    </select>
    <button class="btn btn-pri" id="sbtn">搜索</button>
  </div>
  <div class="sel-btns">
    <button class="btn btn-sec btn-sm" data-action="selAll">全选</button>
    <button class="btn btn-sec btn-sm" data-action="deselAll">全不选</button>
    <button class="btn btn-sec btn-sm" data-action="selQP">仅 QP</button>
    <button class="btn btn-sec btn-sm" data-action="selMS">仅 MS</button>
    <span class="sel-cnt" id="rcnt">未搜索</span>
  </div>
  <div class="results-grid" id="rlist">
    <div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg><div>选择科目后点击搜索</div></div>
  </div>
</div>

<div class="panel" id="pnl-batch">
  <div class="filter-row">
    <select id="b-subj"><option value="">加载中...</option></select>
    <select id="b-yfrom"></select>
    <span style="font-size:11px;color:var(--text3)">–</span>
    <select id="b-yto"></select>
  </div>
  <div class="quick-years">
    <span>快速选择:</span>
    <button class="btn btn-sec btn-sm" data-action="quickYears" data-years="3">近3年</button>
    <button class="btn btn-sec btn-sm" data-action="quickYears" data-years="5">近5年</button>
    <button class="btn btn-sec btn-sm" data-action="quickYears" data-years="99">全部</button>
  </div>
  <div class="bgrid">
    <div>
      <div class="bsec-t">季节</div>
      <div class="cbgrp" id="cbg-seasons">
        <label class="cbitem on"><input type="checkbox" value="m" checked><span>春季 (Mar)</span></label>
        <label class="cbitem on"><input type="checkbox" value="s" checked><span>夏季 (Jun)</span></label>
        <label class="cbitem on"><input type="checkbox" value="w" checked><span>冬季 (Nov)</span></label>
      </div>
    </div>
    <div>
      <div class="bsec-t">Paper 类型</div>
      <div class="cbgrp" id="cbg-papers">
        <label class="cbitem"><input type="checkbox" value="1"><span>Paper 1</span></label>
        <label class="cbitem"><input type="checkbox" value="2"><span>Paper 2</span></label>
        <label class="cbitem"><input type="checkbox" value="3"><span>Paper 3</span></label>
        <label class="cbitem"><input type="checkbox" value="4"><span>Paper 4</span></label>
        <label class="cbitem"><input type="checkbox" value="5"><span>Paper 5</span></label>
        <label class="cbitem"><input type="checkbox" value="6"><span>Paper 6</span></label>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
    <button class="btn btn-pri" id="pvbtn">预览</button>
    <label class="chk-label"><input type="checkbox" id="dl-ms-batch" checked><span>含答案</span></label>
  </div>
  <div class="prev-area" id="prev">点击「预览」查看将要下载的文件...</div>
</div>

</div>

<footer class="dock">
  <span class="dock-status" id="hdr-st">就绪</span>
  <button class="dock-btn primary" id="dlbtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载选中
  </button>
</footer>

</div>

<div class="set-overlay" id="set-overlay">
  <div class="set-dialog">
    <button class="close-btn" id="close-settings-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h3 style="font-size:15px;font-weight:700">设置</h3>
    <div class="setting-row">
      <label>速率限制</label>
      <input type="range" id="b-rate" min="1" max="20" value="5">
      <span class="sval" id="rv">5/s</span>
    </div>
    <div class="setting-row">
      <label>并发数</label>
      <input type="range" id="b-thr" min="1" max="8" value="3">
      <span class="sval" id="tv">3</span>
    </div>
    <div class="setting-row">
      <label class="chk-label"><input type="checkbox" id="dl-ms" checked><span>下载答案(MS)</span></label>
    </div>
    <div class="setting-row">
      <button class="btn btn-err btn-sm" style="width:100%;justify-content:center" id="clear-history-btn">清空下载历史</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div id="confirm-content"></div>
</div>

<div class="fav-overlay" id="fav-overlay">
  <div class="set-dialog" style="max-width:360px">
    <button class="close-btn" id="close-fav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h3 style="font-size:15px;font-weight:700;margin-bottom:8px">收藏科目</h3>
    <div id="fav-list-dialog"></div>
    <button class="btn btn-pri btn-sm" style="width:100%;justify-content:center;margin-top:8px" id="add-fav-btn">+ 收藏当前科目</button>
  </div>
</div>

<div id="toasts"></div>

<script src="popup.js"></script>
</body>
</html>
