services:
  - type: web
    name: cpaper-api
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/cpaper.db
      - key: PORT
        value: "8080"
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: cpaper-data
      mountPath: /var/data
      sizeGB: 1
