app = "cpaper-api"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[env]
  PORT = "8080"
  DB_PATH = "/app/data/cpaper.db"

[[mounts]]
  source = "cpaper_data"
  destination = "/app/data"
