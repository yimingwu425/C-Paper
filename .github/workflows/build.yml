name: Build Native macOS

on:
  workflow_dispatch:
  pull_request:
    # Native-owned paths only. Archived legacy sources under `legacy/` are
    # intentionally excluded from the active native validation/release workflow.
    paths:
      - "Package.swift"
      - "macos/**"
      - "assets/**"
      - "version.json"
      - ".swiftlint.yml"
      - ".swiftformat"
      - "scripts/build_native_dmg.sh"
      - "scripts/check_repo_hygiene.sh"
      - "scripts/check_swift_quality.sh"
      - "scripts/check_version_drift.sh"
      - "scripts/lib/**"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    # Native-owned paths only for branch pushes. Tag pushes publish the native
    # product line; the final pywebview release uses `legacy-release.yml`.
    paths:
      - "Package.swift"
      - "macos/**"
      - "assets/**"
      - "version.json"
      - ".swiftlint.yml"
      - ".swiftformat"
      - "scripts/build_native_dmg.sh"
      - "scripts/check_repo_hygiene.sh"
      - "scripts/check_swift_quality.sh"
      - "scripts/check_version_drift.sh"
      - "scripts/lib/**"
      - ".github/workflows/build.yml"

concurrency:
  group: native-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          bash --version | head -1
          python3 --version
          ruby --version

      - name: Check shell syntax
        run: |
          bash -n \
            scripts/build_native_dmg.sh \
            scripts/check_repo_hygiene.sh \
            scripts/check_swift_quality.sh \
            scripts/check_version_drift.sh \
            scripts/lib/native_dmg_helpers.sh \
            scripts/lib/version_helpers.sh

      - name: Validate JSON metadata
        run: python3 -m json.tool version.json >/dev/null

      - name: Validate workflow YAML
        run: |
          ruby - <<'RUBY'
          require "yaml"

          Dir.glob(".github/workflows/*.{yml,yaml}").sort.each do |path|
            YAML.load_file(path)
            puts "Parsed #{path}"
          end
          RUBY

      - name: Check version drift
        run: bash scripts/check_version_drift.sh

      - name: Check repo hygiene
        run: bash scripts/check_repo_hygiene.sh

      - name: Check Swift quality
        env:
          CPAPER_SWIFT_QUALITY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          CPAPER_SWIFT_QUALITY_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/check_swift_quality.sh

      - name: Run Swift tests
        run: swift test --jobs 1

  package:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Optional release secrets for Developer ID signing + notarization:
      # `CPAPER_DEVELOPER_ID_CERT_P12_BASE64`, `CPAPER_DEVELOPER_ID_CERT_PASSWORD`,
      # `CPAPER_CODESIGN_IDENTITY`, `CPAPER_NOTARY_KEYCHAIN_PROFILE`,
      # `CPAPER_NOTARY_APPLE_ID`, `CPAPER_NOTARY_TEAM_ID`, and `CPAPER_NOTARY_APP_PASSWORD`.
      # If any secret is missing, the build script stays on its default ad hoc signing path.
      - name: Configure optional Developer ID signing and notarization
        env:
          CPAPER_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.CPAPER_DEVELOPER_ID_CERT_P12_BASE64 }}
          CPAPER_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.CPAPER_DEVELOPER_ID_CERT_PASSWORD }}
          CPAPER_CODESIGN_IDENTITY: ${{ secrets.CPAPER_CODESIGN_IDENTITY }}
          CPAPER_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.CPAPER_NOTARY_KEYCHAIN_PROFILE }}
          CPAPER_NOTARY_APPLE_ID: ${{ secrets.CPAPER_NOTARY_APPLE_ID }}
          CPAPER_NOTARY_TEAM_ID: ${{ secrets.CPAPER_NOTARY_TEAM_ID }}
          CPAPER_NOTARY_APP_PASSWORD: ${{ secrets.CPAPER_NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            CPAPER_DEVELOPER_ID_CERT_P12_BASE64
            CPAPER_DEVELOPER_ID_CERT_PASSWORD
            CPAPER_CODESIGN_IDENTITY
            CPAPER_NOTARY_KEYCHAIN_PROFILE
            CPAPER_NOTARY_APPLE_ID
            CPAPER_NOTARY_TEAM_ID
            CPAPER_NOTARY_APP_PASSWORD
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Optional Developer ID / notarization secrets are incomplete; using ad hoc signing path."
              exit 0
            fi
          done

          KEYCHAIN_PATH="$RUNNER_TEMP/cpaper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cpaper-developer-id.p12"
          LOGIN_KEYCHAIN="$(security default-keychain -d user | tr -d '"')"
          export CERT_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["CPAPER_DEVELOPER_ID_CERT_P12_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CPAPER_DEVELOPER_ID_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "$CPAPER_NOTARY_KEYCHAIN_PROFILE" \
            --apple-id "$CPAPER_NOTARY_APPLE_ID" \
            --team-id "$CPAPER_NOTARY_TEAM_ID" \
            --password "$CPAPER_NOTARY_APP_PASSWORD"

          {
            echo "CPAPER_CODESIGN_IDENTITY=$CPAPER_CODESIGN_IDENTITY"
            echo "CPAPER_NOTARY_KEYCHAIN_PROFILE=$CPAPER_NOTARY_KEYCHAIN_PROFILE"
          } >> "$GITHUB_ENV"

      - name: Build native DMG
        run: |
          chmod +x scripts/build_native_dmg.sh
          CONFIGURATION=release ./scripts/build_native_dmg.sh

      - name: Verify DMG and background guide
        run: |
          set -euo pipefail
          DMG="$(ls dist/C-Paper-Native-*-standalone-*.dmg | head -1)"
          hdiutil verify "$DMG"
          MOUNT_OUTPUT="$(hdiutil attach -nobrowse -readonly "$DMG")"
          echo "$MOUNT_OUTPUT"
          VOL="$(printf '%s\n' "$MOUNT_OUTPUT" | awk -F'\t' '/\/Volumes\//{print $NF; exit}')"
          test -n "$VOL"
          test -d "$VOL/CPaperNative.app"
          test -L "$VOL/Applications"
          test -f "$VOL/.background/background.png"
          hdiutil detach "$VOL"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-Paper-Native-DMG
          path: dist/C-Paper-Native-*-standalone-*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: C-Paper-Native-DMG
          path: dist

      - name: Prepare native release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          echo "RELEASE_NAME=C-Paper Native ${VERSION}" >> "$GITHUB_ENV"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from textwrap import dedent

          version = os.environ["VERSION"]
          with open("version.json", encoding="utf-8") as handle:
              release_notes = json.load(handle).get("release_notes", "").strip()
          if not release_notes:
              release_notes = f"- Updated native/backend release metadata to {version}."

          body = dedent(f"""\
          # C-Paper Native {version}

          C-Paper Native {version} is the current maintained macOS release of C-Paper. The active product line is now the native SwiftUI/AppKit app with a Swift-native backend.

          ## Download

          | Platform | File | Notes |
          | --- | --- | --- |
          | macOS | `C-Paper-Native-{version}-standalone-*.dmg` | Open the DMG and drag `CPaperNative.app` into `Applications`. |

          ## What changed in {version}

          {release_notes}

          ## Main features

          - Search Cambridge International Education past papers by subject, year, and season.
          - Preview PDFs inside the app, with local cache reuse when files already exist.
          - Group question papers and mark schemes together for easier review.
          - Build batch download queues across years, seasons, and paper numbers.
          - Track download progress, completed items, failed items, and cancellation state.
          - Save local settings such as download directory, proxy URL, data source, rate, concurrency, duplicate-file handling, and favorite subjects.

          ## Install notes

          macOS may show a developer verification warning on first launch. If that happens, right-click `CPaperNative.app`, choose **Open**, and confirm.

          ## Architecture note

          This release is for the native macOS line:

          - `macos/`: SwiftUI/AppKit desktop client and Swift-native backend
          - `legacy/python-backend/`: archived Python bridge/backend reference

          The old Python + pywebview implementation remains archived under `legacy/pywebview/` and is not the active product line.

          ## Verification

          The release workflow builds the native app, packages a standalone DMG, verifies the DMG, mounts it, checks the app bundle and Applications symlink, and then publishes this GitHub Release.

          ## Disclaimer

          C-Paper is a local desktop search and download helper. It does not own, host, or redistribute Cambridge International Education papers. Data availability depends on the third-party source used by the app.
          """)
          Path("native-release-notes.md").write_text(body, encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.RELEASE_NAME }}"
          body_path: native-release-notes.md
          files: dist/C-Paper-Native-*-standalone-*.dmg
          draft: false
          prerelease: false
