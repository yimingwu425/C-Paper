name: Build Native macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Package.swift"
      - "macos/**"
      - "bridge/**"
      - "backend/**"
      - "assets/**"
      - "scripts/build_native_dmg.sh"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build-native-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show tool versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          python3 --version

      - name: Build native DMG
        run: |
          chmod +x scripts/build_native_dmg.sh
          CONFIGURATION=debug ./scripts/build_native_dmg.sh

      - name: Verify DMG and background guide
        run: |
          set -euo pipefail
          DMG="$(ls dist/C-Paper-Native-*-standalone-*.dmg | head -1)"
          hdiutil verify "$DMG"
          MOUNT_OUTPUT="$(hdiutil attach -nobrowse -readonly "$DMG")"
          echo "$MOUNT_OUTPUT"
          VOL="$(printf '%s\n' "$MOUNT_OUTPUT" | awk -F'\t' '/\/Volumes\//{print $NF; exit}')"
          test -n "$VOL"
          test -d "$VOL/CPaperNative.app"
          test -L "$VOL/Applications"
          test -f "$VOL/.background/background.png"
          hdiutil detach "$VOL"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: C-Paper-Native-DMG
          path: dist/C-Paper-Native-*-standalone-*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "C-Paper ${{ github.ref_name }}"
          body: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🍎 macOS | `C-Paper-Native-*.dmg` | 打开后拖入 Applications |

            ### macOS 说明
            首次运行如提示“无法验证开发者”：
            右键 → 打开 → 仍然打开
          files: dist/C-Paper-Native-*-standalone-*.dmg
          draft: false
          prerelease: false
